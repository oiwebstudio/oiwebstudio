<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Encargar un ramo — Lore</title>
<meta name="description" content="Encarga tu ramo en Lore: elige la ocasión, el tamaño y escribe la dedicatoria. Nosotras lo montamos con flor de temporada."/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Karla:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
  :root{
    --blush:#f9f2f0; --papel:#fffcfb; --linea:#ecdcd6;
    --tinta:#43373a; --cuerpo:#7d6b6e; --suave:#a59292;
    --salvia:#6f7d64; --salvia2:#5a684f; --rosa:#c98a8e;
    --serif:"Cormorant Garamond",Georgia,serif; --sans:"Karla",system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;}
  body{font-family:var(--sans);background:var(--blush);color:var(--cuerpo);line-height:1.7;-webkit-font-smoothing:antialiased;}
  a{color:inherit;text-decoration:none;}
  h1,h2,h3{font-family:var(--serif);color:var(--tinta);font-weight:600;line-height:1.1;}
  .wrap{max-width:760px;margin:0 auto;padding:0 26px;}
  .label{text-transform:uppercase;letter-spacing:.26em;font-size:11px;font-weight:600;color:var(--salvia);}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:10px;font-weight:600;font-size:13.5px;text-transform:uppercase;letter-spacing:.1em;padding:16px 30px;border-radius:999px;cursor:pointer;border:none;transition:all .2s;background:var(--salvia);color:#fff;width:100%;}
  .btn:hover{background:var(--salvia2);}
  a:focus-visible,button:focus-visible,input:focus-visible,select:focus-visible,textarea:focus-visible{outline:3px solid var(--salvia);outline-offset:2px;}
  @media(prefers-reduced-motion:reduce){ *{animation:none!important;transition:none!important;} }

  header{position:sticky;top:0;z-index:50;background:rgba(249,242,240,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--linea);}
  .nav{display:flex;align-items:center;justify-content:space-between;height:70px;max-width:760px;margin:0 auto;padding:0 26px;}
  .logo{font-family:var(--serif);font-weight:600;font-size:24px;color:var(--tinta);}
  .logo em{font-style:italic;color:var(--salvia);}
  .back{font-size:12.5px;text-transform:uppercase;letter-spacing:.1em;}
  .back:hover{color:var(--salvia);}

  .cab{padding:58px 0 34px;text-align:center;}
  .cab h1{font-size:clamp(36px,5.6vw,54px);margin-top:12px;}
  .cab p{margin-top:12px;max-width:50ch;margin-left:auto;margin-right:auto;}

  .tarjeta{background:var(--papel);border:1px solid var(--linea);border-radius:26px;padding:36px;margin:14px 0 46px;box-shadow:0 26px 50px -28px rgba(67,55,58,.3);}
  .campo{margin-bottom:22px;}
  label{display:block;font-weight:600;font-size:13px;letter-spacing:.06em;text-transform:uppercase;color:var(--tinta);margin-bottom:8px;}
  input,select,textarea{width:100%;font-family:var(--sans);font-size:15px;color:var(--tinta);background:var(--blush);border:1px solid var(--linea);border-radius:14px;padding:13px 15px;transition:border-color .15s;}
  input:focus,select:focus,textarea:focus{border-color:var(--salvia);outline:none;}
  .chips{display:flex;flex-wrap:wrap;gap:10px;}
  .chips label{cursor:pointer;margin:0;text-transform:none;letter-spacing:0;}
  .chips input{position:absolute;opacity:0;pointer-events:none;width:auto;}
  .chips span{display:inline-block;border:1.5px solid var(--linea);border-radius:999px;padding:10px 18px;font-size:14px;color:var(--cuerpo);transition:all .2s;background:var(--papel);}
  .chips input:checked+span{border-color:var(--salvia);background:rgba(111,125,100,.1);color:var(--tinta);}
  .fila2{display:grid;gap:16px;grid-template-columns:1fr;}
  @media(min-width:620px){ .fila2{grid-template-columns:1fr 1fr;} }

  /* Dedicatoria con tarjeta de vista previa */
  .dedi-preview{margin-top:14px;background:var(--papel);border:1.5px dashed var(--rosa);border-radius:6px;padding:24px 26px 18px;position:relative;transform:rotate(-.8deg);box-shadow:0 14px 28px -16px rgba(67,55,58,.3);}
  .dedi-preview::before{content:"";position:absolute;top:-12px;left:50%;transform:translateX(-50%);width:14px;height:14px;border-radius:50%;background:var(--rosa);}
  .dedi-preview p{font-family:var(--serif);font-style:italic;font-size:19px;color:var(--tinta);line-height:1.5;min-height:56px;}
  .dedi-preview small{display:block;text-align:right;color:var(--suave);font-size:11px;letter-spacing:.14em;text-transform:uppercase;margin-top:10px;}
  .contador{text-align:right;font-size:12px;color:var(--suave);margin-top:6px;}
  .contador.limite{color:var(--rosa);font-weight:600;}

  footer{border-top:1px solid var(--linea);padding:26px 0;text-align:center;font-size:13px;color:var(--suave);}
</style>
</head>
<body>

<header>
<div class="nav">
<a href="index.html" class="logo">Lore<em>.</em></a>
<a href="index.html" class="back">← Volver</a>
</div>
</header>

<div class="cab wrap">
<span class="label">Encargo</span>
<h1>Cuéntanos para quién es</h1>
<p>Tú pones la historia, nosotras las flores. Pedidos antes de las 12:00, entrega el mismo día en Tolosaldea.</p>
</div>

<div class="wrap">
<form class="tarjeta" id="formEncargo">
<div class="campo">
<label>La ocasión</label>
<div class="chips" role="radiogroup" aria-label="Ocasión">
<label><input type="radio" name="ocasion" value="Cumpleaños" checked/><span>🎂 Cumpleaños</span></label>
<label><input type="radio" name="ocasion" value="Aniversario"/><span>💍 Aniversario</span></label>
<label><input type="radio" name="ocasion" value="Porque sí"/><span>🌷 Porque sí</span></label>
<label><input type="radio" name="ocasion" value="Pedir perdón"/><span>🕊 Pedir perdón</span></label>
<label><input type="radio" name="ocasion" value="Condolencias"/><span>🤍 Condolencias</span></label>
</div>
</div>
<div class="campo">
<label>Tamaño</label>
<div class="chips" role="radiogroup" aria-label="Tamaño">
<label><input type="radio" name="tam" value="Detalle (25€)"/><span>Detalle · 25€</span></label>
<label><input type="radio" name="tam" value="Mediano (35€)" checked/><span>Mediano · 35€</span></label>
<label><input type="radio" name="tam" value="Grande (50€)"/><span>Grande · 50€</span></label>
<label><input type="radio" name="tam" value="Que quite el hipo (70€+)"/><span>Que quite el hipo · 70€+</span></label>
</div>
</div>
<div class="fila2">
<div class="campo"><label for="fecha">¿Para cuándo?</label><input id="fecha" name="fecha" type="date"/></div>
<div class="campo"><label for="entrega">Recogida o envío</label><select id="entrega"><option>Lo recojo en tienda</option><option>Envío en Tolosa (+3€)</option><option>Envío en Tolosaldea (+6€)</option></select></div>
</div>
<div class="campo">
<label for="dedi">La dedicatoria <span style="color:var(--suave);text-transform:none;letter-spacing:0;">(la escribimos a mano en la tarjeta)</span></label>
<textarea id="dedi" rows="3" maxlength="140" placeholder="Para Maite, que llena de flores todo lo que toca."></textarea>
<div class="contador"><span id="cuenta">0</span>/140</div>
<div class="dedi-preview" aria-hidden="true">
<p id="dediPreview">Tu dedicatoria aparecerá aquí, como se verá en la tarjeta…</p>
<small>Lore. · escrita a mano</small>
</div>
</div>
<div class="campo"><label for="nombre">Tu nombre y teléfono</label><input id="nombre" required placeholder="Amaia · 600 00 00 00"/></div>
<button type="submit" class="btn">Encargar por WhatsApp →</button>
</form>
</div>

<footer>© 2026 Lore Floristería · Tolosa, Gipuzkoa</footer>

<script>
  var dedi = document.getElementById('dedi');
  var prev = document.getElementById('dediPreview');
  var cuenta = document.getElementById('cuenta');
  dedi.addEventListener('input', function(){
    var t = dedi.value.trim();
    prev.textContent = t || 'Tu dedicatoria aparecerá aquí, como se verá en la tarjeta…';
    cuenta.textContent = dedi.value.length;
    cuenta.parentElement.classList.toggle('limite', dedi.value.length > 120);
  });
  document.getElementById('formEncargo').addEventListener('submit', function(e){
    e.preventDefault();
    var r = function(n){ var el = document.querySelector('input[name="' + n + '"]:checked'); return el ? el.value : ''; };
    var lineas = [
      'Hola, quiero encargar un ramo en Lore:',
      '• Ocasión: ' + r('ocasion'),
      '• Tamaño: ' + r('tam'),
      '• Entrega: ' + document.getElementById('entrega').value
    ];
    var f = document.getElementById('fecha').value;
    if (f) lineas.push('• Para el día: ' + f);
    var d = dedi.value.trim();
    if (d) lineas.push('• Dedicatoria: "' + d + '"');
    lineas.push('• Contacto: ' + document.getElementById('nombre').value.trim());
    window.open('https://wa.me/34600000000?text=' + encodeURIComponent(lineas.join('\n')), '_blank', 'noopener');
  });
</script>
</body>
</html>
